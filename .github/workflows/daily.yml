name: Agent Viral 19h30

on:
  schedule:
    - cron: '30 19 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publier:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Télécharger le code
        uses: actions/checkout@v4

      - name: ⚙️ Installer Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 🎬 Installer FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -1

      - name: 🗣️ Installer Edge TTS
        run: |
          pip install edge-tts
          edge-tts --version

      - name: 📦 Installer dépendances Node
        run: |
          npm install
          echo "✅ Dépendances installées"

      - name: 🌐 Installer Playwright
        run: |
          npx playwright install chromium --with-deps
          echo "✅ Playwright prêt"

      - name: 📋 Préparer configuration
        run: |
          mkdir -p data output
          echo '${{ secrets.CONFIG }}' > data/state.json
          echo "✅ Config chargée"

      - name: 🤖 Lancer Agent Viral
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          WHATSAPP_DEFAULT: ${{ secrets.WHATSAPP_DEFAULT }}
          NODE_ENV: production
          TZ: Africa/Abidjan
        run: |
          node server.js
          echo "✅ Agent terminé"

      - name: 📊 Sauvegarder historique
        if: always()
        run: |
          if [ -f data/history.json ]; then
            echo "📊 Historique:"
            cat data/history.json
          fi

      - name: 🎬 Vérifier vidéos créées
        if: always()
        run: |
          echo "📁 Fichiers générés:"
          ls -la output/ 2>/dev/null || echo "Pas de vidéos"
