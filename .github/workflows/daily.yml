name: Agent Viral Multi-Plateformes

on:
  schedule:
    - cron: '30 19 * * *'  # 19h30 UTC
  workflow_dispatch:

jobs:
  publier:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Installer FFmpeg + Polices
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu-core
        
      - name: Installer Edge TTS
        run: pip install edge-tts
        
      - name: Installer Playwright
        run: |
          npm install playwright
          npx playwright install chromium
          sudo npx playwright install-deps chromium
          
      - name: Lancer Agent
        env:
          BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          WHATSAPP_DEFAULT: ${{ secrets.WHATSAPP_DEFAULT }}
          TIKTOK_COOKIES_B64: ${{ secrets.TIKTOK_COOKIES_B64 }}
          INSTAGRAM_COOKIES_B64: ${{ secrets.INSTAGRAM_COOKIES_B64 }}
          FACEBOOK_COOKIES_B64: ${{ secrets.FACEBOOK_COOKIES_B64 }}
        run: node server.js
        
      - name: Sauvegarder vidéos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: videos-generees
          path: output/*_final.mp4
          retention-days: 7
