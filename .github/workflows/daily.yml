name: Agent Viral 19h30

on:
  schedule:
    - cron: '30 19 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publier:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Telecharger code
        uses: actions/checkout@v4

      - name: Installer Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Installer FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Installer Edge TTS
        run: pip install edge-tts

      - name: Installer dependances
        run: npm install

      - name: Installer Playwright
        run: npx playwright install chromium --with-deps

      - name: Preparer config
        env:
          CONFIG_DATA: ${{ secrets.CONFIG }}
        run: |
          mkdir -p data output
          echo "$CONFIG_DATA" > data/state.json
          echo "Config chargée"
          cat data/state.json | head -5

      - name: Lancer Agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          WHATSAPP_DEFAULT: ${{ secrets.WHATSAPP_DEFAULT }}
          TZ: Africa/Abidjan
          SKIP_PUBLISH: "true"
        run: node server.js

      - name: Sauvegarder video
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: video-du-jour
          path: output/
          retention-days: 7
